name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint e testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (formatação)
        run: black --check .

      - name: Mypy (tipagem)
        run: mypy app

      - name: Pytest (testes + cobertura)
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend — instalação e build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (verificação)
        run: npm run format:check

      - name: Vitest
        run: npm run test

      - name: Build de produção
        run: npm run build
